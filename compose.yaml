services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - http_proxy
        - https_proxy
        - no_proxy
        - NPM_CONFIG_REGISTRY
        - NPM_CONFIG_REPLACE_REGISTRY_HOST
    environment:
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/app.db}
      SESSION_SECRET: ${SESSION_SECRET:-}
    ports:
      - "8000:8000"
